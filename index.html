<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Blackwater — Bürgeramt</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Crimson+Text:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

<style>
/* ============================================================
   DESIGN & PALETTE (Blackwater Elegant Western)
   ============================================================ */
:root {
  --paper:       #f2e6d0; /* Altes Pergament */
  --paper-dark:  #e0d2b4;
  --ink:         #2a1b0a; /* Fast Schwarz (Tinte) */
  --wood-dark:   #2b1a0f; /* Dunkles Holz für den Hintergrund */
  --gold:        #c49a5e; /* Goldene Akzente */
  --accent:      #8c2d1f; /* Dezentes Weinrot für Details */
  --font-display: 'Playfair Display', serif;
  --font-body:    'Crimson Text', serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background-color: var(--wood-dark);
  /* Ein dezentes Muster für den Hintergrund (Holz/Stoff-Struktur) */
  background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png");
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 18px;
  line-height: 1.6;
  min-height: 100vh;
}

/* Header */
header {
  background-color: rgba(0, 0, 0, 0.4);
  border-bottom: 2px solid var(--gold);
  padding: 40px 20px;
  text-align: center;
}

header h1 {
  font-family: var(--font-display);
  font-size: clamp(30px, 8vw, 60px);
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  text-shadow: 3px 3px 5px rgba(0,0,0,0.8);
}

header h1 span {
  display: block;
  font-size: 0.35em;
  letter-spacing: 0.3em;
  color: #fff;
  margin-top: 10px;
  font-weight: 400;
  opacity: 0.8;
}

/* Navigation */
nav {
  background-color: #1a0f08;
  border-bottom: 1px solid var(--gold);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

nav ul {
  list-style: none;
  display: flex;
  justify-content: center;
  max-width: 900px;
  margin: 0 auto;
}

nav ul li a {
  display: block;
  padding: 15px 25px;
  font-family: var(--font-display);
  font-size: 14px;
  color: var(--paper-dark);
  text-decoration: none;
  text-transform: uppercase;
  transition: all 0.3s;
}

nav ul li a:hover, nav ul li a.active {
  color: var(--gold);
  background: rgba(255,255,255,0.05);
}

/* Content Area */
.page-wrapper {
  max-width: 900px;
  margin: 0 auto;
  padding: 40px 20px;
}

.view { display: none; }
.view.active { display: block; animation: fadeIn 0.5s ease; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 30px;
  border-bottom: 2px solid var(--gold);
  padding-bottom: 10px;
}

.section-title {
  font-family: var(--font-display);
  font-size: 28px;
  color: var(--gold);
  text-transform: uppercase;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  padding: 10px 20px;
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: bold;
  text-transform: uppercase;
  border: 1px solid var(--gold);
  cursor: pointer;
  transition: all 0.3s;
  background: transparent;
}

.btn-primary {
  background-color: var(--gold);
  color: var(--wood-dark);
}

.btn-primary:hover {
  background-color: transparent;
  color: var(--gold);
}

/* Paper Cards */
.paper {
  background-color: var(--paper);
  background-image: url("https://www.transparenttextures.com/patterns/parchment.png");
  border: 1px solid #c0b090;
  box-shadow: 5px 5px 15px rgba(0,0,0,0.3), inset 0 0 50px rgba(0,0,0,0.05);
  padding: 25px;
  position: relative;
}

.data-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 25px;
}

.data-card {
  transition: transform 0.2s;
}
.data-card:hover { transform: scale(1.02); }

.card-title {
  font-family: var(--font-display);
  font-size: 20px;
  border-bottom: 1px solid rgba(0,0,0,0.1);
  margin-bottom: 10px;
  padding-bottom: 5px;
}

/* Modals */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  display: none; align-items: center; justify-content: center; z-index: 1000;
  backdrop-filter: blur(3px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--paper);
  background-image: url("https://www.transparenttextures.com/patterns/parchment.png");
  padding: 40px;
  width: 90%;
  max-width: 500px;
  border: 3px double var(--gold);
}

.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-family: var(--font-display); font-size: 12px; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 12px; border: 1px solid #c0b090; background: rgba(255,255,255,0.3); font-family: var(--font-body); font-size: 16px;
}

.appt-item { margin-bottom: 15px; border-left: 5px solid var(--accent); }
</style>
</head>
<body>

<header>
  <h1>Blackwater<span>Bürgeramt</span></h1>
</header>

<nav>
  <ul>
    <li><a href="#" class="nav-link active" data-view="citizens">Einwohner</a></li>
    <li><a href="#" class="nav-link" data-view="appointments">Termine</a></li>
    <li><a href="#" class="nav-link" data-view="businesses">Gewerbe</a></li>
  </ul>
</nav>

<div class="page-wrapper">
  <section id="view-citizens" class="view active">
    <div class="section-header">
      <h2 class="section-title">Einwohnerregister</h2>
      <button class="btn btn-primary" id="btn-add-citizen">+ Bürger eintragen</button>
    </div>
    <div class="data-grid" id="citizen-grid"></div>
  </section>

  <section id="view-appointments" class="view">
    <div class="section-header"><h2 class="section-title">Terminkalender</h2></div>
    <div class="paper" style="margin-bottom: 40px;">
        <h3 style="margin-bottom:15px; font-family:var(--font-display);">Neuen Termin ansetzen</h3>
        <div class="form-group"><label>Treffpunkt</label><select id="appt-location"><option>Blackwater</option><option>Valentine</option><option>Saint Denis</option><option>Rhodes</option><option>Strawberry</option></select></div>
        <div class="form-group"><label>Datum & Uhrzeit</label><input type="datetime-local" id="appt-datetime"></div>
        <div class="form-group"><label>Anlass</label><textarea id="appt-note" placeholder="Grund des Termins..."></textarea></div>
        <button class="btn btn-primary" id="btn-add-appt">Termin im Kalender vermerken</button>
    </div>
    <div id="list-appointments"></div>
  </section>

  <section id="view-businesses" class="view">
    <div class="section-header">
        <h2 class="section-title">Gewerbe-Verzeichnis</h2>
        <button class="btn btn-primary" id="btn-add-business">+ Gewerbe anmelden</button>
    </div>
    <div class="data-grid" id="business-grid"></div>
  </section>
</div>

<div class="modal-overlay" id="modal-citizen">
    <div class="modal">
        <h3 class="section-title" style="margin-bottom: 20px;">Neue Personenakte</h3>
        <div class="form-group"><label>Vollständiger Name</label><input type="text" id="c-name"></div>
        <div class="form-group"><label>Alter</label><input type="number" id="c-age"></div>
        <div class="form-group"><label>Beruf</label><input type="text" id="c-job"></div>
        <div class="form-group"><label>Wohnort / Lager</label><input type="text" id="c-home"></div>
        <div style="display:flex; gap:15px; margin-top:25px;">
            <button class="btn btn-primary" id="btn-save-citizen">Eintragen</button>
            <button class="btn" style="color:var(--accent);" onclick="closeModal('modal-citizen')">Abbrechen</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal-business">
    <div class="modal">
        <h3 class="section-title" style="margin-bottom: 20px;">Gewerbeanmeldung</h3>
        <div class="form-group"><label>Name des Geschäfts</label><input type="text" id="b-name"></div>
        <div class="form-group"><label>Inhaber</label><input type="text" id="b-owner"></div>
        <div class="form-group"><label>Anschrift</label><input type="text" id="b-address"></div>
        <div class="form-group"><label>Art des Gewerbes</label><input type="text" id="b-type"></div>
        <div style="display:flex; gap:15px; margin-top:25px;">
            <button class="btn btn-primary" id="btn-save-business">Gewerbe anmelden</button>
            <button class="btn" style="color:var(--accent);" onclick="closeModal('modal-business')">Abbrechen</button>
        </div>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, query, orderBy } 
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAJ_OvlQ_K-rMgJl-7mhE0Zp2nnIIvsPVc",
    authDomain: "stadt-blackwater.firebaseapp.com",
    projectId: "stadt-blackwater",
    storageBucket: "stadt-blackwater.firebasestorage.app",
    messagingSenderId: "377493157689",
    appId: "1:377493157689:web:1a80bbc49a9018683a1ae8"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // NAVIGATION
  const navLinks = document.querySelectorAll('.nav-link');
  const views = document.querySelectorAll('.view');
  navLinks.forEach(link => {
    link.onclick = (e) => {
      e.preventDefault();
      navLinks.forEach(l => l.classList.remove('active'));
      link.classList.add('active');
      views.forEach(v => v.classList.remove('active'));
      document.getElementById('view-' + link.dataset.view).classList.add('active');
    };
  });

  window.closeModal = (id) => document.getElementById(id).classList.remove('open');

  // BÜRGER
  const citizenCol = collection(db, "citizens");
  onSnapshot(citizenCol, (snapshot) => {
    const grid = document.getElementById('citizen-grid');
    grid.innerHTML = '';
    snapshot.forEach(docSnap => {
      const c = docSnap.data();
      const card = document.createElement('div');
      card.className = 'data-card paper';
      card.innerHTML = `
        <div class="card-title">${c.name}</div>
        <div style="font-size:15px;">
            <strong>Alter:</strong> ${c.age}<br>
            <strong>Beruf:</strong> ${c.job}<br>
            <strong>Ort:</strong> ${c.home}
        </div>
        <button onclick="window.delDoc('citizens','${docSnap.id}')" style="background:none; border:none; color:#8c2d1f; cursor:pointer; font-size:11px; margin-top:15px; text-transform:uppercase;">[ Akte schließen ]</button>
      `;
      grid.appendChild(card);
    });
  });

  document.getElementById('btn-add-citizen').onclick = () => document.getElementById('modal-citizen').classList.add('open');
  document.getElementById('btn-save-citizen').onclick = async () => {
    const name = document.getElementById('c-name').value;
    if(!name) return;
    await addDoc(citizenCol, {
      name: name,
      age: document.getElementById('c-age').value,
      job: document.getElementById('c-job').value,
      home: document.getElementById('c-home').value
    });
    closeModal('modal-citizen');
    document.querySelectorAll('#modal-citizen input').forEach(i => i.value = '');
  };

  // TERMINE
  const apptCol = collection(db, "appointments");
  onSnapshot(query(apptCol, orderBy("date")), (snapshot) => {
    const list = document.getElementById('list-appointments');
    list.innerHTML = '';
    snapshot.forEach(docSnap => {
      const a = docSnap.data();
      const item = document.createElement('div');
      item.className = 'appt-item paper';
      item.innerHTML = `
        <div style="font-family:var(--font-display); font-size:18px; font-weight:bold;">${a.location}</div>
        <div style="font-style:italic; font-size:14px; color:#8c2d1f;">${new Date(a.date).toLocaleString('de-DE')} Uhr</div>
        <div style="margin-top:8px;">${a.note}</div>
        <button onclick="window.delDoc('appointments','${docSnap.id}')" style="position:absolute; top:10px; right:15px; border:none; background:none; font-size:20px; cursor:pointer;">&times;</button>
      `;
      list.appendChild(item);
    });
  });

  document.getElementById('btn-add-appt').onclick = async () => {
    const d = document.getElementById('appt-datetime').value;
    if(!d) return alert("Bitte Datum wählen");
    await addDoc(apptCol, {
      location: document.getElementById('appt-location').value,
      date: d,
      note: document.getElementById('appt-note').value
    });
    document.getElementById('appt-note').value = '';
  };

  // GEWERBE
  const bizCol = collection(db, "businesses");
  onSnapshot(bizCol, (snapshot) => {
    const grid = document.getElementById('business-grid');
    grid.innerHTML = '';
    snapshot.forEach(docSnap => {
      const b = docSnap.data();
      const card = document.createElement('div');
      card.className = 'data-card paper';
      card.innerHTML = `
        <div class="card-title">${b.name}</div>
        <div style="font-size:15px;">
            <strong>Inhaber:</strong> ${b.owner}<br>
            <strong>Anschrift:</strong> ${b.address}<br>
            <strong>Art:</strong> ${b.type}
        </div>
        <button onclick="window.delDoc('businesses','${docSnap.id}')" style="background:none; border:none; color:#8c2d1f; cursor:pointer; font-size:11px; margin-top:15px; text-transform:uppercase;">[ Lizenz entziehen ]</button>
      `;
      grid.appendChild(card);
    });
  });

  document.getElementById('btn-add-business').onclick = () => document.getElementById('modal-business').classList.add('open');
  document.getElementById('btn-save-business').onclick = async () => {
    await addDoc(bizCol, {
      name: document.getElementById('b-name').value,
      owner: document.getElementById('b-owner').value,
      address: document.getElementById('b-address').value,
      type: document.getElementById('b-type').value
    });
    closeModal('modal-business');
    document.querySelectorAll('#modal-business input').forEach(i => i.value = '');
  };

  // LÖSCHEN
  window.delDoc = async (coll, id) => {
    if(confirm("Möchten Sie diesen Eintrag wirklich dauerhaft aus den Akten löschen?")) {
        await deleteDoc(doc(db, coll, id));
    }
  };
</script>
</body>
</html>
